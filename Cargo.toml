[package]
name = "freemkv"
version = "0.2.1"
edition = "2021"
license = "AGPL-3.0"
description = "Open source 4K UHD / Blu-ray / DVD backup tool"
repository = "https://github.com/freemkv/freemkv"

[[bin]]
name = "freemkv"
path = "src/main.rs"

[dependencies]
libfreemkv = "0.3"
libc = "0.2"
ureq = { version = "2", features = ["json"] }
serde_json = "1"
zip = { version = "2", default-features = false, features = ["deflate"] }
isolang = "2.4.0"
