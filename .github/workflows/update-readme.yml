name: Update README version

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version in README
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          FILE="README.md"

          # Update "freemkv <version>" in the options block
          sed -i "s|freemkv [0-9]*\.[0-9]*\.[0-9]*|freemkv ${VERSION#v}|g" "$FILE"

      - name: Commit and push
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update to freemkv ${VERSION}"
          git push
